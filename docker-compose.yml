# Production-oriented compose. Set env vars or use .env file.
# For local dev with hot reload: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: orgnet
      POSTGRES_USER: orgnet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orgnet"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://orgnet:${POSTGRES_PASSWORD:-changeme_in_production}@db:5432/orgnet
      - FLASK_ENV=production
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-change-this-to-a-random-secret-key}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python -c 'from app.database import init_db; import os; init_db(os.environ[\"DATABASE_URL\"])' 2>/dev/null || true &&
             gunicorn --bind 0.0.0.0:5000 --workers 4 --timeout 60 'app:create_app()'"

volumes:
  postgres_data:
